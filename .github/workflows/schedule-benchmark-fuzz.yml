name: Schedule benchmark fuzz

on:
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Seconds for each fuzz campaign"
        required: true
        default: "1800"
      base_schedule:
        description: "Baseline AFL++ power schedule, e.g. explore / fast / rare"
        required: true
        default: "explore"
      test_schedule:
        description: "Candidate schedule under test, e.g. linucb"
        required: true
        default: "linucb"
      protocols:
        description: "Which protocol targets to fuzz"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - iec61850
          - modbus

  push:
    branches:
      - schedule-dev

permissions:
  contents: read

concurrency:
  group: schedule-benchmark-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fuzz-schedule:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    env:
      FUZZ_SECONDS: ${{ github.event.inputs.fuzz_seconds || '1800' }}
      BASE_SCHEDULE: ${{ github.event.inputs.base_schedule || 'explore' }}
      TEST_SCHEDULE: ${{ github.event.inputs.test_schedule || 'linucb' }}
      RUN_PROTOCOLS: ${{ github.event.inputs.protocols || 'both' }}

      AFL_SKIP_CPUFREQ: "1"
      AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES: "1"
      AFL_NO_UI: "1"
      AFL_NO_AFFINITY: "1"
      AFL_QUIET: "1"

      PREENY_SOCKET_SO: "desock.so"
      AFL_PATH: ${{ github.workspace }}

      # 注意：这里不要用 runner.temp。
      # job 级 env 里 runner context 不可用。
      RISKINS_WORKBASE: ${{ github.workspace }}/.schedule-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize benchmark workspace
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf "$RISKINS_WORKBASE"
          mkdir -p "$RISKINS_WORKBASE"
          echo "RISKINS_WORKBASE=$RISKINS_WORKBASE"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"

      - name: Show runner toolchain
        shell: bash
        run: |
          set -eux
          uname -a
          gcc --version
          g++ --version
          clang-18 --version || true
          clang --version || true
          llvm-config-18 --version || true
          cmake --version || true
          python3 --version
          nproc || true

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          GCC_MAJOR="$(gcc -dumpversion | cut -d. -f1)"
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            git \
            python3 \
            python3-dev \
            python3-setuptools \
            cmake \
            automake \
            autoconf \
            libtool \
            flex \
            bison \
            cargo \
            libglib2.0-dev \
            libpixman-1-dev \
            libgtk-3-dev \
            lld-18 \
            llvm-18 \
            llvm-18-dev \
            clang-18 \
            gcc-${GCC_MAJOR}-plugin-dev \
            libstdc++-${GCC_MAJOR}-dev

      - name: Build Preeny desock.so
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf /tmp/preeny
          git clone --depth 1 https://github.com/zardus/preeny.git /tmp/preeny
          make -C /tmp/preeny/src desock.so
          mkdir -p "${GITHUB_WORKSPACE}/.deps/preeny"
          cp /tmp/preeny/src/desock.so "${GITHUB_WORKSPACE}/.deps/preeny/desock.so"
          test -f "${GITHUB_WORKSPACE}/.deps/preeny/desock.so"
          echo "PREENY_DIR=${GITHUB_WORKSPACE}/.deps/preeny" >> "$GITHUB_ENV"
          ls -lah "${GITHUB_WORKSPACE}/.deps/preeny/desock.so"

      - name: Validate and prepare helper scripts
        shell: bash
        run: |
          set -euxo pipefail

          REQUIRED_SCRIPTS=(
            ".github/scripts/prepare-riskins-build.sh"
            ".github/scripts/run-schedule-benchmark-fuzz.sh"
            ".github/scripts/summarize-schedule-benchmark.py"
          )

          echo "[*] Checking helper scripts exist..."
          for script in "${REQUIRED_SCRIPTS[@]}"; do
            if [ ! -f "$script" ]; then
              echo "[!] Missing required script: $script" >&2
              exit 1
            fi
          done

          echo "[*] Checking CRLF line endings..."
          for script in "${REQUIRED_SCRIPTS[@]}"; do
            if grep -q $'\r' "$script"; then
              echo "[!] CRLF line endings detected in: $script" >&2
              echo "    Please convert it to LF before committing." >&2
              exit 1
            fi
          done

          echo "[*] Granting execute permissions..."
          chmod +x "${REQUIRED_SCRIPTS[@]}"

          echo "[*] Verifying execute permissions..."
          for script in "${REQUIRED_SCRIPTS[@]}"; do
            if [ ! -x "$script" ]; then
              echo "[!] Script is not executable after chmod: $script" >&2
              exit 1
            fi
          done

          echo "[*] Running shell syntax checks..."
          bash -n .github/scripts/prepare-riskins-build.sh
          bash -n .github/scripts/run-schedule-benchmark-fuzz.sh

          echo "[*] Running Python syntax check..."
          python3 -m py_compile .github/scripts/summarize-schedule-benchmark.py

          echo "[+] Helper scripts are ready."

      - name: Prepare runner for AFL crash detection
        shell: bash
        run: |
          set -eux
          echo "Before: $(cat /proc/sys/kernel/core_pattern)"
          sudo sysctl -w kernel.core_pattern=core
          echo "After: $(cat /proc/sys/kernel/core_pattern)"

      - name: Relax runner AFL settings
        shell: bash
        run: |
          set -eux
          sudo -E ./afl-system-config || true

      - name: Build AFL++ and protocol targets
        shell: bash
        env:
          CC: clang-18
          CXX: clang++-18
          LLVM_CONFIG: llvm-config-18
          AFL_PATH: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          ./.github/scripts/prepare-riskins-build.sh

      - name: Validate afl-fuzz candidate schedule support
        shell: bash
        run: |
          set -euxo pipefail

          test -n "${AFL_ROOT:-}"
          test -x "${AFL_ROOT}/afl-fuzz"

          echo "[*] Checking afl-fuzz help output..."
          "${AFL_ROOT}/afl-fuzz" -h > /tmp/afl-fuzz-help.txt 2>&1 || true

          grep -Ei -- "-p|schedule|power" /tmp/afl-fuzz-help.txt || {
            echo "[!] Cannot find schedule-related help text in afl-fuzz -h output" >&2
            cat /tmp/afl-fuzz-help.txt >&2
            exit 1
          }

          echo "[*] Checking candidate schedule name: ${TEST_SCHEDULE}"
          if [ "${TEST_SCHEDULE}" = "linucb" ]; then
            if ! grep -qi "linucb" /tmp/afl-fuzz-help.txt; then
              echo "[!] TEST_SCHEDULE=linucb, but afl-fuzz -h does not mention linucb." >&2
              echo "    This may mean -p linucb is not registered in afl-fuzz help/option list." >&2
              echo "    If linucb is accepted but hidden from help, relax this check." >&2
              cat /tmp/afl-fuzz-help.txt >&2
              exit 1
            fi
          fi

          echo "[+] afl-fuzz schedule help check passed."

      - name: Run schedule benchmark fuzz campaigns
        shell: bash
        env:
          AFL_PATH: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          ./.github/scripts/run-schedule-benchmark-fuzz.sh

      - name: Compare schedule benchmark results
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          OUT_ROOT="${RISKINS_WORKBASE}/schedule-fuzz-out"

          if [ ! -d "$OUT_ROOT" ]; then
            echo "schedule fuzz output directory not found: $OUT_ROOT"
            echo "RISKINS_WORKBASE=$RISKINS_WORKBASE"
            find "$RISKINS_WORKBASE" -maxdepth 4 -type f -o -type d 2>/dev/null | sort || true
            exit 1
          fi

          ./.github/scripts/summarize-schedule-benchmark.py "$OUT_ROOT"

      - name: Upload schedule benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schedule-benchmark-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ${{ github.workspace }}/.schedule-ci/schedule-fuzz-out/**